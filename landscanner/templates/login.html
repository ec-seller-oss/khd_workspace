<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン - Land Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1a2332] min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <!-- ロゴ -->
    <div class="text-center mb-8">
      <div class="flex items-center justify-center gap-3 mb-3">
        <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
        </svg>
        <span class="text-white font-bold text-3xl tracking-wide">Land Scanner</span>
      </div>
      <p class="text-gray-400 text-sm">首都圏投資用土地物件 自動収集・利回り計算</p>
    </div>

    <!-- ログインカード -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">ログイン</h2>

      {% if error %}
      <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
          <input
            type="email" name="email" required
            placeholder="demo@landscanner.com"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-sm"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">パスワード</label>
          <input
            type="password" name="password" required
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition text-sm"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors mt-2"
        >
          ログイン
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        アカウントをお持ちでない方は
        <a href="/register" class="text-blue-600 hover:text-blue-700 font-medium">新規登録</a>
      </p>
    </div>
  </div>
</body>
</html>
